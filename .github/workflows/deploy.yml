name: Deploy ODMGR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ODMGR_ENV_PRODUCTION: ${{ secrets.ODMGR_ENV_PRODUCTION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: ODMGR_ENV_PRODUCTION
          script: |
            cd /opt/docker/apps/opendatamanager
            git pull
            umask 077
            printf '%s\n' "$ODMGR_ENV_PRODUCTION" > .env.production
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml pull --ignore-buildable
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up --build -d
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml ps
