name: Deploy ODMGR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase)
        id: vars
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/opendatamanager" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-app:latest
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-app:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.vars.outputs.IMAGE_PREFIX }}-app:latest
          cache-to: type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: prod
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-frontend:latest
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.vars.outputs.IMAGE_PREFIX }}-frontend:latest
          cache-to: type=inline

      - name: Build and push osm-updater
        uses: docker/build-push-action@v5
        with:
          context: ./docker/osm-updater
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-osm-updater:latest
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-osm-updater:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.vars.outputs.IMAGE_PREFIX }}-osm-updater:latest
          cache-to: type=inline

      - name: Build and push overpass
        uses: docker/build-push-action@v5
        with:
          context: ./docker/overpass
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-overpass:latest
            ${{ steps.vars.outputs.IMAGE_PREFIX }}-overpass:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.vars.outputs.IMAGE_PREFIX }}-overpass:latest
          cache-to: type=inline

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      ODMGR_ENV_PRODUCTION: ${{ secrets.ODMGR_ENV_PRODUCTION }}

    steps:
      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: ODMGR_ENV_PRODUCTION
          script: |
            cd /opt/docker/apps/opendatamanager
            git pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            umask 077
            printf '%s\n' "$ODMGR_ENV_PRODUCTION" > .env.production
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml pull
            docker container prune -f
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml ps
            docker image prune -f
