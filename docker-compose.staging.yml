services:
  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: ${APP_PREFIX}_nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - default
      - traefik_public
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.${APP_PREFIX}-staging.rule=Host(`${APP_PREFIX}-staging.tudominio.org`)"
      - "traefik.http.routers.${APP_PREFIX}-staging.entrypoints=websecure"
      - "traefik.http.routers.${APP_PREFIX}-staging.tls=true"
      - "traefik.http.routers.${APP_PREFIX}-staging.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.${APP_PREFIX}-staging.loadbalancer.server.port=8080"

networks:
  traefik_public:
    external: true
