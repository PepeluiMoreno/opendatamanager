services:
  app:
    build: .
    container_name: ${APP_PREFIX}_app
    restart: always
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - default
      - traefik_public
    deploy:
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT:-2g}
          cpus: '${APP_CPU_LIMIT:-2.0}'
        reservations:
          memory: ${APP_MEMORY_RESERVATION:-512m}
  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: ${APP_PREFIX}_frontend
    restart: always
    depends_on:
      - app
  db:
    image: postgres:15-alpine
    container_name: ${APP_PREFIX}_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

networks:
  traefik_public:
    external: true
