services:
  app:
    image: ghcr.io/pepeluimoreno/opendatamanager-app:latest

  frontend:
    image: ghcr.io/pepeluimoreno/opendatamanager-frontend:latest

  osm-updater:
    image: ghcr.io/pepeluimoreno/opendatamanager-osm-updater:latest

  overpass:
    image: ghcr.io/pepeluimoreno/opendatamanager-overpass:latest

  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: ${APP_PREFIX}_nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - internal
      - traefik_public
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.${APP_PREFIX}.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_PREFIX}.entrypoints=websecure"
      - "traefik.http.routers.${APP_PREFIX}.tls=true"
      - "traefik.http.routers.${APP_PREFIX}.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.${APP_PREFIX}.loadbalancer.server.port=8080"

networks:
  traefik_public:
    external: true
    name: traefik
